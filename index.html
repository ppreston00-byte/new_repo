<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bird survey map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    #map {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- PapaParse to load CSV -->
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <script>
    // Create base map
    var map = L.map('map').setView([0, 0], 2); // global view

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Load CSV
    Papa.parse('data.csv', {
      download: true,
      header: true,
      dynamicTyping: true,
      complete: function(results) {
        var data = results.data;
        var markers = [];

        data.forEach(function(row) {
          if (!row.Latitude || !row.Longitude) return;

          var lat = parseFloat(row.Latitude);
          var lng = parseFloat(row.Longitude);

          var popupHtml =
            '<strong>' + row.PointID + '</strong><br>' +
            row.SurveyCity + '<br><br>' +
            '<b>Survey 1</b>: ' + (row.Survey1 || '') + '<br>' +
            '<b>Survey 2</b>: ' + (row.Survey2 || '') + '<br>' +
            '<b>Survey 3</b>: ' + (row.Survey3 || '') + '<br>' +
            '<b>Survey 4</b>: ' + (row.Survey4 || '');

          var marker = L.marker([lat, lng]).bindPopup(popupHtml);
          marker.addTo(map);
          markers.push(marker);
        });

        if (markers.length > 0) {
          var group = L.featureGroup(markers);
          map.fitBounds(group.getBounds().pad(0.2));
        }
      }
    });
  </script>
</body>
</html>
