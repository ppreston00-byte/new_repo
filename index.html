<script>
  // Create base map
  var map = L.map('map').setView([0, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Load CSV
  Papa.parse('data.csv', {
    download: true,
    header: true,
    dynamicTyping: false,  // Changed to false - treats lat/long as strings, safer
    complete: function(results) {
      console.log('First row keys:', Object.keys(results.data[0]));
      console.log('First row sample:', results.data[0]);
      
      var data = results.data;
      var markers = [];
      
      data.forEach(function(row, index) {
        console.log('Row', index, 'lat:', row.Latitude, 'lng:', row.Longitude);  // Debug each row
        
        var lat = parseFloat(row.Latitude);
        var lng = parseFloat(row.Longitude);
        
        if (isNaN(lat) || isNaN(lng)) {
          console.log('Skipping row', index, 'invalid coords');
          return;
        }

        var popupHtml =
          '<strong>' + row.PointID + '</strong><br>' +
          row.SurveyCity + '<br><br>' +
          '<b>Survey 1</b>: ' + (row.Survey1 || row['Survey 1'] || '') + '<br>' +
          '<b>Survey 2</b>: ' + (row.Survey2 || row['Survey 2'] || '') + '<br>' +
          '<b>Survey 3</b>: ' + (row.Survey3 || row['Survey 3'] || '') + '<br>' +
          '<b>Survey 4</b>: ' + (row.Survey4 || row['Survey 4'] || '');

        var marker = L.marker([lat, lng]).bindPopup(popupHtml);
        marker.addTo(map);
        markers.push(marker);
      });

      if (markers.length > 0) {
        var group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.2));
        console.log('Added', markers.length, 'markers');
      } else {
        console.log('No valid markers added');
      }
    }
  });
</script>

    });
  </script>
</body>
</html>
