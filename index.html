<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bird survey cities</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin: 20px; font-family: Arial; }
    .city-maps { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
    .city-map { height: 300px; border: 1px solid #ccc; border-radius: 8px; }
    h3 { margin: 0 0 10px; text-align: center; }
    a { color: blue; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Global Urban Bird Surveys by City</h1>
  <div class="city-maps">
    <div>
      <h3>Dakar</h3>
      <div id="map-dakar" class="city-map"></div>
    </div>
    <div>
      <h3>Nairobi</h3>
      <div id="map-nairobi" class="city-map"></div>
    </div>
    <div>
      <h3>Rio</h3>
      <div id="map-rio" class="city-map"></div>
    </div>
    <div>
      <h3>Paris</h3>
      <div id="map-paris" class="city-map"></div>
    </div>
    <div>
      <h3>Toronto</h3>
      <div id="map-toronto" class="city-map"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <script>
    const cities = ['Dakar', 'Nairobi', 'Rio', 'Paris', 'Toronto'];
    const mapIds = ['dakar', 'nairobi', 'rio', 'paris', 'toronto'];

    // Base tile layer
    function createTileLayer() {
      return L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
        attribution: '&copy; OpenStreetMap contributors'
      });
    }

    // Load CSV once, create city maps
    Papa.parse('data.csv', {
      download: true,
      header: true,
      dynamicTyping: false,
      complete: function(results) {
        const data = results.data;
        const cityMarkers = {};

        // Group markers by city
        data.forEach(function(row) {
          const city = row.SurveyCity || row['SurveyCity'];
          if (!city || isNaN(parseFloat(row.Latitude)) || isNaN(parseFloat(row.Longitude))) return;

          const lat = parseFloat(row.Latitude);
          const lng = parseFloat(row.Longitude);
          const pointId = row.PointID || row['PointID'];

          // Count species dynamically (split by comma)
          const getCount = (surveyCol) => {
            const speciesStr = row[surveyCol] || row[surveyCol.replace(' ', '')] || '';
            return speciesStr.split(',').filter(s => s.trim()).length;
          };

          // Build popup with counts and links
          let popupHtml = '<strong>' + pointId + '</strong><br>' + city + '<br><br>';
          for (let i = 1; i <= 4; i++) {
            const count = getCount(`Survey${i}`);
            if (count > 0) {
              popupHtml += `<b>Survey ${i}</b>: ${count} species <a href="survey.html?point=${encodeURIComponent(pointId)}&survey=${i}" target="_blank">[View]</a><br>`;
            }
          }

          if (!cityMarkers[city]) cityMarkers[city] = [];
          cityMarkers[city].push(L.marker([lat, lng]).bindPopup(popupHtml));
        });

        // Create one map per city
        mapIds.forEach(function(mapId, index) {
          const city = cities[index];
          const mapDiv = L.map('map-' + mapId);
          createTileLayer().addTo(mapDiv);

          const markers = cityMarkers[city] || [];
          if (markers.length > 0) {
            const group = L.featureGroup(markers);
            group.addTo(mapDiv);
            mapDiv.fitBounds(group.getBounds().pad(0.1));
          } else {
            mapDiv.setView([0, 0], 2);
          }

          // Responsive resize
          window.addEventListener('resize', () => mapDiv.invalidateSize());
        });
      }
    });
  </script>
</body>
</html>
